<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div id="calendar"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        let calendarEl = document.getElementById("calendar");

        let calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: "dayGridMonth",
          height: "auto",

          headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,timeGridWeek,timeGridDay",
          },

          events: [
            {
              title: "Dental Appointment - Savindu",
              start: "2026-02-10T10:00:00",
              end: "2026-02-10T11:00:00",
            },
            {
              title: "Root Canal",
              start: "2026-02-12",
            },
          ],

          dateClick: function (info) {
            alert("You clicked: " + info.dateStr);
          },

          eventClick: function (info) {
            alert("Appointment: " + info.event.title);
          },
        });

        calendar.render();
      });
    </script>
  </body>
</html>

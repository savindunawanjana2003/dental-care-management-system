<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        background-color: rgb(255, 208, 0);
      }
      .box {
        /* position: relative; */
        width: 40vw;
        height: 40vw;
        background-color: aliceblue;
      }

      .box2 {
        /* position: absolute; */
        position: relative;
        width: 10vw;
        height: 10vw;
        background-color: blue;
        right: 0;
      }

      #box {
        display: flex;
        gap: 20px;
      }

      #sinig,
      #sing-Up {
        padding: 10px 20px;
        background-color: #1e3799;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      i {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="box2"></div>
    </div>
    <div id="box">
      <div id="sinig"><i class="fa-solid fa-right-to-bracket"></i> Sign In</div>

      <div id="sing-Up"><i class="fa-solid fa-user-plus"></i> Sign Up</div>
    </div>
  </body>
</html>

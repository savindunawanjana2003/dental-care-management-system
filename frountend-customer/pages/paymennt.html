<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dental Appointment Payment</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f6f9;
      }

      .payment-card {
        max-width: 600px;
        margin: auto;
        margin-top: 60px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .payment-header {
        background: #0d6efd;
        color: white;
        padding: 15px;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card payment-card">
      <div class="payment-header">
        <h4>Dental Appointment Payment</h4>
      </div>

      <div class="card-body">
        <form id="paymentForm">
          <div class="mb-3">
            <label class="form-label">Patient Name</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter patient name"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Appointment Date</label>
            <input type="date" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Doctor</label>
            <select class="form-select">
              <option selected>Select Doctor</option>
              <option>Dr. Sunil Perera</option>
              <option>Dr. Ajith Kularathne</option>
              <option>Dr. Nimal Fernando</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Treatment</label>
            <select class="form-select">
              <option>Dental Checkup</option>
              <option>Teeth Cleaning</option>
              <option>Root Canal</option>
              <option>Dental Filling</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Amount (LKR)</label>
            <input
              type="number"
              class="form-control"
              placeholder="Enter amount"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select class="form-select" id="paymentMethod">
              <option value="card">Card Payment</option>
              <option value="cash">Cash</option>
            </select>
          </div>

          <div id="cardDetails">
            <div class="mb-3">
              <label class="form-label">Card Number</label>
              <input
                type="text"
                class="form-control"
                placeholder="XXXX XXXX XXXX XXXX"
              />
            </div>

            <div class="row">
              <div class="col-md-6">
                <label class="form-label">Expiry Date</label>
                <input type="month" class="form-control" />
              </div>

              <div class="col-md-6">
                <label class="form-label">CVV</label>
                <input type="password" class="form-control" placeholder="***" />
              </div>
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
              Confirm Payment
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const paymentMethod = document.getElementById("paymentMethod");
      const cardDetails = document.getElementById("cardDetails");

      paymentMethod.addEventListener("change", function () {
        if (this.value === "cash") {
          cardDetails.style.display = "none";
        } else {
          cardDetails.style.display = "block";
        }
      });
    </script>
  </body>
</html>
